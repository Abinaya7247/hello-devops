version: 0.1

component: build

steps:
  - type: Command
    name: "Install"
    command: |
      echo "Installing dependencies..."

  - type: Command
    name: "Build"
    command: |
      echo "Building project..."
      mkdir -p output
      cp index.html output/
      cp app.js output/

outputArtifacts:
  - name: app
    type: BINARY
    location: output
