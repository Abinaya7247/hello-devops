version: 0.1

component: build

steps:
  - type: Command
    name: "Prepare Output"
    command: |
      echo "Creating output folder..."
      mkdir -p output
      
      echo "Copying files..."
      cp index.html output/index.html
      cp app.js output/app.js
      
      echo "Verifying output folder..."
      ls -la output

outputArtifacts:
  - name: app
    type: BINARY
    location: output/
