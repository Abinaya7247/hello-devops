version: 0.1

component: build

steps:
  - type: Command
    name: "Check Files"
    command: |
      echo "Listing files..."
      ls -la

  - type: Command
    name: "Build"
    command: |
      echo "Creating output folder..."
      mkdir -p output
      
      echo "Copying files..."
      cp *.html output/ || true
      cp *.js output/ || true

      echo "Build completed"

outputArtifacts:
  - name: app
    type: BINARY
    location: output
